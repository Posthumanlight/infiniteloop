#generics
[skills.generic_enemy_attack]
name = "Attack"
target_type = "single_enemy"
energy_cost = 0
action_type = "action"
damage_type = "slashing"
hits = [
  { formula = "attacker.attack", variance = 0.25 },
]
#warrior
[skills.slash]
name = "Slash"
target_type = "single_enemy"
energy_cost = 0
action_type = "action"
damage_type = "slashing"
hits = [
  { formula = "base_power + attacker.attack * 1.5", base_power = 10, variance = 0.1 },
]

[skills.cleave]
name = "Cleave"
target_type = "all_enemies"
energy_cost = 10
action_type = "action"
damage_type = "slashing"
hits = [
  { formula = "base_power + attacker.attack * 1.25 + attacker.mastery", base_power = 10, variance = 0.1 },
]

