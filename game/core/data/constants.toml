[combat]
turn_timer_seconds = 45
max_party_size = 4
min_party_size = 1
initiative_dice = 20
skip_turn_on_timeout = true
min_damage = 0
default_variance = 0.1

[restoration]
# Expression evaluated per alive player between nodes.
# Available variables: max_hp, current_hp, level, attack, speed,
#   crit_chance, crit_dmg, resistance, energy, mastery
formula = "20 + max_hp * 0.20"

[events]
vote_timer_seconds = 30
max_choices = 4
min_choices = 2

[world_difficulty]
base_scalar = 1.0
per_avg_level = 0.2
per_extra_player = 1.1
max_scalar = 999.99

[world_difficulty.stat_weights]
hp = 3
attack = 1.5
speed = 0.05
resistance = 1
mastery = 0.35

[loot]
item_quality_formula = "room_difficulty_scalar"

[summons]
max_total_per_owner = 3

[item_dissolve]
currency_name = "Fortuna Motes"

[item_dissolve.rarity_values]
common = 1
uncommon = 3
rare = 5
epic = 25
legendary = 100
