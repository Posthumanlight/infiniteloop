[events.cursed_shrine]
name = "Cursed Shrine"
event_type = "multiplayer"
initial_stage_id = "start"
min_depth = 2
max_depth = 100
weight = 5

[events.cursed_shrine.stages.start]
title = "Cursed Shrine"
description = "A crumbling altar radiates dark energy. Bones are scattered at its base."

[[events.cursed_shrine.stages.start.choices]]
label = "Desecrate the shrine"
description = "Destroy the source of evil."
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["fire_imp", "fire_imp", "fire_imp", "fire_imp", "fire_imp"], combat_location_id = "burning_cavern"},
]

[[events.cursed_shrine.stages.start.choices]]
label = "Leave it undisturbed"
description = "Not every fight needs to be fought."
outcomes = []

[events.river_with_surprise]
name = "River with surprise"
event_type = "multiplayer"
initial_stage_id = "start"
min_depth = 2
max_depth = 100
weight = 5

[events.river_with_surprise.stages.start]
title = "River with surprise"
description = "The stream of water blocks your path forward. While searching for crossing, murky green silhouette emerges from below."

[[events.river_with_surprise.stages.start.choices]]
label = "It`s crocodiles!"
description = "It`s goddamn crocodiles!"
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["crocodile", "crocodile"], combat_location_id = "forest_trail"},
]

[[events.river_with_surprise.stages.start.choices]]
label = "It`s goblins!"
description = "It`s goddamn goblins!"
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["goblin_boss"], combat_location_id = "forest_trail"},
]

[events.wine_ferstival]
name = "Wine Festival"
event_type = "multiplayer"
initial_stage_id = "start"
min_depth = 2
max_depth = 100
weight = 5

[events.wine_ferstival.stages.start]
title = "Wine Festival"
description = "While traveling, you find a meadow with dozens of stalls bursting with wine. Nearby merchant calls you, offering you a free sample."

[[events.wine_ferstival.stages.start.choices]]
label = "Give me some of that red!"
description = "Red wine is the best."
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["goblin_boss"], combat_location_id = "forest_trail"},
]

[[events.wine_ferstival.stages.start.choices]]
label = "White is superior choice!"
description = "Ah, a sophisticated one."
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["goblin_boss"], combat_location_id = "forest_trail"},
]

[[events.wine_ferstival.stages.start.choices]]
label = "Both. Both is good"
description = "That`s greedy!"
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["goblin_boss"], combat_location_id = "forest_trail"},
]

[[events.wine_ferstival.stages.start.choices]]
label = "Do you have beer by any chance?"
description = "???"
outcomes = [
    { action = "start_combat", target = "all", enemy_group = ["goblin_boss"], combat_location_id = "forest_trail"},
]

