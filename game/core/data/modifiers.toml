# Stackable: each stack adds +10 base damage to slash
[modifiers.slash_power]
name = "Slash Power"
phase = "pre_hit"
stackable = true
skill_filter = "slash"
class_tags = ["warrior"]
expr = "10"
action = "bonus_damage"

#Stackable: vampirism — heal for 2% of damage dealt per stack
[modifiers.vampiric]
name = "Vampiric"
phase = "post_hit"
stackable = true
expr = "damage_dealt * 0.02"
action = "vampirism"
class_tags=["warrior", "mage"]

[modifiers.arcane_bolt_power]
name = "Arcane Bolt Damage"
phase = "pre_hit"
stackable = true
skill_filter = "arcane_bolt"
class_tags = ["mage"]
expr = "10"
action = "bonus_damage"

[modifiers.fire_brand]
name = "Fire Brand"
phase = "pre_hit"
stackable = false
skill_filter = "slash"
class_tags = ["warrior"]
expr = "0"
action = "change_type"
damage_type_override = "fire"

[modifiers.butcher]
name = "Butcher"
phase = "post_hit"
stackable = true
skill_filter = "deep_wounds"
class_tags = ["warrior"]
expr = "1"
action = "apply_effect"
effect_id = "bleed"

[modifiers.cruelty]
name = "Cruelty"
phase = "post_hit"
stackable = false
skill_filter = "slash"
class_tags = ["warrior"]
expr = "1"
action = "apply_effect"
effect_id = "bleed"
chance = 0.5

[modifiers.exsanguinate]
name = "Exsanguinate"
phase = "post_hit"
stackable = true
class_tags = ["warrior"]
expr = "1.25"
action = "effect_damage_mult"
effect_id = "bleed"

[modifiers.familiar_training]
name = "Familiar Training"
phase = "on_summon"
stackable = true
skill_filter = "summon_familiar"
summon_filter = "familiar"
class_tags = ["summoner"]
expr = "5"
action = "summon_stat_bonus"
summon_stat = "attack"

