# Stackable: each stack adds +10 base damage to slash
[modifiers.slash_power]
name = "Slash Power"
phase = "pre_hit"
stackable = true
skill_filter = "slash"
class_tags = ["warrior"]
expr = "10"
action = "bonus_damage"

#Stackable: vampirism — heal for 2% of damage dealt per stack
[modifiers.vampiric]
name = "Vampiric"
phase = "post_hit"
stackable = true
expr = "damage_dealt * 0.02"
action = "vampirism"
class_tags=["warrior", "mage"]

[modifiers.arcane_bolt_power]
name = "Arcane Bolt Damage"
phase = "pre_hit"
stackable = true
skill_filter = "arcane_bolt"
class_tags = ["mage"]
expr = "10"
action = "bonus_damage"

[modifiers.fire_brand]
name = "Fire Brand"
phase = "pre_hit"
stackable = false
skill_filter = "slash"
class_tags = ["warrior"]
expr = "0"
action = "change_type"
damage_type_override = "fire"
