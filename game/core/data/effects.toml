#warrior
[effects.bleed]
name = "Bleed"
trigger = "on_turn_start"
duration = 3
stackable = true
actions = [
  { type = "damage", expr = "attacker.attack * 0.33", damage_type = "slashing" },
]

[effects.berserker]
name = "Berserker"
trigger = "on_damage_calc"
duration = 3
stackable = false
actions = [
  { type = "damage_taken_mult", expr = "1.1" },
  { type = "damage_dealt_mult", expr = "1.1" },
  { type = "grant_skill", skill_id = "rampage" },
  { type = "block_skill", skill_id = "slash" },
]

[effects.rally_effect]
name = "Rally"
trigger = "on_apply"
duration = 3
stackable = false
actions = [
  { type = "stat_modify", stat = "hp", expr = "attacker.hp * 0.2 + attacker.attack * 0.2", scales_with_stacks = false},
]

#mage
[effects.empowered_arcane]
name = "Empowered Arcane"
trigger = "on_damage_calc"
duration = 10
stackable = true
max_stacks = 10
actions = [
  { type = "stat_modify", stat = "arcane_dmg_pct", expr = "0.1", scales_with_stacks = true },
]

[effects.enlightenment]
name = "Enlightenment"
trigger = "on_apply"
duration = 3
stackable = false
actions = [
  { type = "stat_modify", stat = "mastery", expr = "10 + 2 * target.mastery", scales_with_stacks = false },
  { type = "grant_energy", expr = "target.energy * 0.2", scales_with_stacks = false },
]

#summoner
[effects.mana_reave_effect]
name = "Mana Reave Effect"
trigger = "on_apply"
duration = 1
stackable = false
actions = [
  {type = "grant_energy", expr = "target.energy * 0.25 + 25"},
]

[effects.restoration_effect]
name = "Restoration Effect"
trigger = "on_apply"
duration = 1
stackable = false
actions = [
  {type = "heal", expr = "attacker.mastery + (10*(1+attacker.mastery*0.005))", scales_with_stacks = false}
]

#generics

[effects.stun]
name = "Stun"
trigger = "on_turn_start"
duration = 1
stackable = false
actions = [
  { type = "skip_turn" },
]

