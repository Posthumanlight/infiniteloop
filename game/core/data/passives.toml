[passives.last_stand]
name = "Last Stand"
trigger = "on_take_damage"
condition = "attacker.current_hp < attacker.hp * 0.25"
action = "apply_effect"
effect_id = "fortify"
expr = "1"
usage_limit = "once_per_combat"
target_type = "self"

[passives.arcane_prowess]
name = "Arcane Prowess"
trigger = "on_hit"
condition = "damage_type == ARCANE"
action = "apply_effect"
effect_id = "empowered_arcane"
expr = "1"
usage_limit = "unlimited"